# Production-like local run (Postgres + Orion on :3000).
# Requires `.env` at repo root with integration credentials.
#
#   cp .env.example .env
#   docker compose up --build
#
# App: http://localhost:3000/

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: orion_dev
      POSTGRES_DB: orion
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion -d orion"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - orion_pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped

  orion:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://orion:orion_dev@postgres:5432/orion
      SIGHRA_WEBHOOK_TOKEN: ${SIGHRA_WEBHOOK_TOKEN:-local-docker-dev-token}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@local.dev}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-localdev1}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  orion_pg_data:
