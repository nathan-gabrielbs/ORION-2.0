name: Test

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: [self-hosted, linux, x64]
    container:
      image: node:20-bookworm
    env:
      DATABASE_URL: postgresql://orion:orion_dev@postgres:5432/orion_test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orion
          POSTGRES_PASSWORD: orion_dev
          POSTGRES_DB: orion_test
        options: >-
          --health-cmd "pg_isready -U orion -d orion_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v6
        with:
          version: "9"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm test
