<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BWT Orion</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png">
    <link rel="apple-touch-icon" href="/images/logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root {
            --bg-dark: #0a0e1a;
            --bg-panel: #0f1419;
            --surface: #1a1f2e;
            --surface-2: #1e2433;
            --border: #2a3142;
            --text: #ffffff;
            --text-soft: #9ca3af;
            --text-muted: #6b7280;
            --cyan: #00d4ff;
            --cyan-2: #0099cc;
            --purple: #7c3aed;
            --orange: #f59e0b;

            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 14px;

            --shadow-card:
                0 30px 60px rgba(0, 0, 0, 0.35),
                0 0 0 1px rgba(0, 212, 255, 0.06),
                0 0 30px rgba(0, 212, 255, 0.08);

            --kanban-cyan: #22d3ee;
            --kanban-primary: #00d4ff;
            --kanban-amber: #f59e0b;
            --kanban-violet: #8b5cf6;
            --kanban-rose: #f43f5e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            min-width: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: "Inter", sans-serif;
            color: var(--text);
            overflow-x: hidden;
            overflow-y: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 25%),
                radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.06) 0%, transparent 25%),
                var(--bg-dark);
        }

        .container {
            display: grid;
            grid-template-columns: minmax(620px, 58%) minmax(420px, 42%);
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .image-side {
            position: relative;
            overflow: hidden;
            isolation: isolate;
            height: 100%;
            min-height: 0;
            z-index: 1;
        }

        .truck-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 30% center;
            transform: scale(1.08);
            animation: slowZoom 20s ease-in-out infinite alternate;
            filter: brightness(0.86) contrast(1.05) saturate(1.05);
        }

        @keyframes slowZoom {
            from {
                transform: scale(1.08);
            }

            to {
                transform: scale(1.18);
            }
        }

        .image-overlay {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(124, 58, 237, 0.10), transparent 35%),
                radial-gradient(circle at 85% 75%, rgba(0, 212, 255, 0.12), transparent 35%),
                linear-gradient(135deg,
                    rgba(10, 14, 26, 0.94) 0%,
                    rgba(10, 14, 26, 0.80) 38%,
                    rgba(10, 14, 26, 0.44) 68%,
                    rgba(10, 14, 26, 0.08) 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: clamp(18px, 2.5vw, 36px);
            padding: clamp(24px, 4vw, 60px);
            z-index: 2;
        }

        .brand-section {
            z-index: 2;
            position: relative;
            max-width: min(690px, 100%);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .brand-top {
            flex: 0 0 auto;
        }

        .brand-bottom {
            flex: 1;
            display: flex;
            align-items: flex-end;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: clamp(14px, 2vw, 20px);
            margin-bottom: clamp(18px, 2vw, 28px);
        }

        .logo-icon {
            width: clamp(56px, 6vw, 70px);
            height: clamp(56px, 6vw, 70px);
            flex: 0 0 auto;
            background: transparent;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            isolation: isolate;
            padding: 2px;
        }

        .logo-icon::before {
            content: "";
            position: absolute;
            top: -10%;
            bottom: -10%;
            left: -40%;
            width: 40%;
            border-radius: 999px;
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.05) 25%,
                    rgba(255, 255, 255, 0.18) 50%,
                    rgba(255, 255, 255, 0.05) 75%,
                    rgba(255, 255, 255, 0) 100%);
            filter: blur(3px);
            transform: translateX(0);
            animation: logoSweepHorizontal 2.6s ease-in-out infinite;
            pointer-events: none;
            z-index: 2;
        }

        .logo-icon::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background:
                radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.10), transparent 38%),
                radial-gradient(circle at 70% 70%, rgba(0, 212, 255, 0.08), transparent 42%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
            pointer-events: none;
            z-index: 1;
            opacity: 0.9;
        }

        .logo-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 1;
            filter:
                drop-shadow(0 0 8px rgba(0, 212, 255, 0.14)) drop-shadow(0 0 16px rgba(139, 92, 246, 0.08));
            animation: logoPulse 4.8s ease-in-out infinite;
        }

        @keyframes logoSweepHorizontal {
            0% {
                left: -40%;
                opacity: 0;
            }

            15% {
                opacity: 0.9;
            }

            50% {
                opacity: 1;
            }

            80% {
                opacity: 0.4;
            }

            100% {
                left: 120%;
                opacity: 0;
            }
        }

        @keyframes logoPulse {

            0%,
            100% {
                filter:
                    drop-shadow(0 0 8px rgba(0, 212, 255, 0.14)) drop-shadow(0 0 16px rgba(139, 92, 246, 0.08));
            }

            50% {
                filter:
                    drop-shadow(0 0 10px rgba(0, 212, 255, 0.20)) drop-shadow(0 0 20px rgba(139, 92, 246, 0.10));
            }
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-text .orion {
            font-size: clamp(22px, 2.2vw, 28px);
            font-weight: 800;
            letter-spacing: clamp(2px, 0.4vw, 3px);
            text-transform: uppercase;
            background: linear-gradient(135deg,
                    #ffffff 0%,
                    var(--kanban-cyan) 35%,
                    var(--kanban-primary) 60%,
                    var(--kanban-violet) 100%);
            background-size: 200% 200%;
            animation: brandFlow 10s ease-in-out infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter:
                drop-shadow(0 0 10px rgba(0, 212, 255, 0.16)) drop-shadow(0 0 16px rgba(139, 92, 246, 0.08));
        }

        .brand-text>span:last-child {
            display: block;
            font-size: clamp(10px, 1vw, 12px);
            color: rgba(255, 255, 255, 0.72);
            font-weight: 500;
            letter-spacing: clamp(1.4px, 0.2vw, 3px);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .hero-copy {
            margin-top: 0;
            margin-bottom: clamp(10px, 1.8vh, 24px);
            position: relative;
        }

        .tagline {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: clamp(24px, 3vw, 36px);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.96);
            line-height: 1.15;
            max-width: 620px;
            letter-spacing: -0.02em;
            position: relative;
        }

        .tagline strong {
            color: var(--cyan);
            font-weight: 700;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.22);
            position: relative;
        }

        .tagline strong::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.85), rgba(0, 212, 255, 0));
            opacity: 0.75;
        }

        .tagline-subtitle {
            margin-top: 18px;
            font-size: clamp(14px, 1.4vw, 18px);
            color: rgba(255, 255, 255, 0.72);
            font-weight: 500;
            letter-spacing: 0.02em;
            max-width: 520px;
            position: relative;
            padding-left: 18px;
        }

        .tagline-subtitle::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--cyan);
            transform: translateY(-50%);
            box-shadow:
                0 0 8px rgba(0, 212, 255, 0.7),
                0 0 18px rgba(0, 212, 255, 0.35);
            animation: pulseDot 2.4s ease-in-out infinite;
        }

        .shooting-star {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #fff;
            pointer-events: none;
            opacity: 0;
            z-index: 2;
            box-shadow:
                0 0 6px rgba(255, 255, 255, 0.9),
                0 0 14px rgba(0, 212, 255, 0.7),
                0 0 26px rgba(0, 212, 255, 0.35);
            will-change: transform, opacity;
        }

        .shooting-star::before {
            content: "";
            position: absolute;
            left: -130px;
            top: 50%;
            width: 130px;
            height: 2.4px;
            transform: translateY(-50%);
            border-radius: 999px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(0, 212, 255, 0.18) 35%,
                    rgba(0, 212, 255, 0.62) 70%,
                    rgba(255, 255, 255, 0.98) 100%);
            filter: blur(0.9px);
        }

        .shooting-star::after {
            content: "";
            position: absolute;
            left: -180px;
            top: 50%;
            width: 180px;
            height: 4px;
            transform: translateY(-50%);
            border-radius: 999px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(0, 212, 255, 0.26),
                    rgba(255, 255, 255, 0.35));
            filter: blur(2px);
            opacity: 0.75;
        }

        @keyframes meteorDiagonal {
            0% {
                opacity: 0;
                transform:
                    translate3d(0, 0, 0) rotate(var(--angle)) scale(0.85);
            }

            8% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform:
                    translate3d(var(--tx), var(--ty), 0) rotate(var(--angle)) scale(1);
            }
        }

        @keyframes pulseDot {

            0%,
            100% {
                transform: translateY(-50%) scale(1);
                opacity: 0.8;
            }

            50% {
                transform: translateY(-50%) scale(1.35);
                opacity: 1;
            }
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 26px;
            max-width: 760px;
        }

        .feature-item {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            min-height: 48px;
            padding: 12px 16px 12px 12px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.025));
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.88);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.01em;
            backdrop-filter: blur(10px);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.04),
                0 8px 20px rgba(0, 0, 0, 0.16);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(0, 212, 255, 0.10),
                    transparent);
            animation: featureScan 5s linear infinite;
        }

        .feature-item:nth-child(2)::before {
            animation-delay: 1.4s;
        }

        .feature-item:nth-child(3)::before {
            animation-delay: 2.8s;
        }

        @keyframes featureScan {
            0% {
                left: -120%;
            }

            100% {
                left: 140%;
            }
        }

        .feature-item:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 212, 255, 0.22);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 10px 24px rgba(0, 0, 0, 0.18),
                0 0 22px rgba(0, 212, 255, 0.08);
        }

        .feature-icon-wrap {
            width: 34px;
            height: 34px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.18), rgba(124, 58, 237, 0.16));
            border: 1px solid rgba(0, 212, 255, 0.18);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                0 0 14px rgba(0, 212, 255, 0.08);
            flex: 0 0 auto;
        }

        .feature-item i {
            color: var(--cyan);
            font-size: 15px;
            text-shadow: 0 0 12px rgba(0, 212, 255, 0.32);
        }

        .form-side {
            position: relative;
            z-index: 4;
            height: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(20px, 3vw, 40px);
            background:
                linear-gradient(90deg,
                    rgba(12, 18, 28, 0.65) 0%,
                    rgba(14, 19, 29, 0.70) 10%,
                    rgba(15, 20, 25, 0.75) 22%,
                    rgba(15, 20, 25, 0.82) 100%);
            overflow: hidden;
        }

        .form-side .panel-divider {
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg,
                    transparent 0%,
                    rgba(34, 211, 238, 0.50) 18%,
                    rgba(0, 212, 255, 0.70) 38%,
                    rgba(139, 92, 246, 0.45) 62%,
                    rgba(244, 63, 94, 0.35) 82%,
                    transparent 100%);
            box-shadow:
                0 0 14px rgba(0, 212, 255, 0.12),
                0 0 24px rgba(139, 92, 246, 0.06);
            opacity: 0.9;
            pointer-events: none;
            z-index: 2;
        }

        .form-side::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(34, 211, 238, 0.85) 18%,
                    rgba(0, 212, 255, 0.90) 34%,
                    rgba(245, 158, 11, 0.85) 52%,
                    rgba(139, 92, 246, 0.85) 72%,
                    rgba(244, 63, 94, 0.85) 88%,
                    transparent 100%);
            opacity: 0.8;
            z-index: 2;
        }

        .form-side::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top right, rgba(0, 212, 255, 0.08), transparent 30%),
                radial-gradient(circle at bottom left, rgba(124, 58, 237, 0.06), transparent 30%);
            pointer-events: none;
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.035) 1px, transparent 1px);
            background-size: 36px 36px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
            mask-image: linear-gradient(to left, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0.15));
            -webkit-mask-image: linear-gradient(to left, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0.15));
        }

        @keyframes gridMove {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(36px, 36px);
            }
        }

        .tech-lines {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.42;
        }

        .tech-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.8), transparent);
            animation: lineScan 5s linear infinite;
        }

        .tech-line:nth-child(1) {
            top: 18%;
            animation-delay: 0s;
        }

        .tech-line:nth-child(2) {
            top: 52%;
            animation-delay: 1.5s;
            background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.7), transparent);
        }

        .tech-line:nth-child(3) {
            top: 82%;
            animation-delay: 3s;
        }

        @keyframes lineScan {
            0% {
                opacity: 0;
                transform: translateX(-100%);
            }

            50% {
                opacity: 0.55;
            }

            100% {
                opacity: 0;
                transform: translateX(100%);
            }
        }

        .constellation-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 1;
            mix-blend-mode: screen;
        }

        .constellation-svg {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
        }

        .constellation-group {
            animation: constellationDrift 18s ease-in-out infinite alternate;
            transform-origin: center;
            transition: transform 0.35s ease-out;
        }

        .constellation-group.g2 {
            animation-duration: 24s;
            animation-delay: -6s;
        }

        .constellation-group.g3 {
            animation-duration: 20s;
            animation-delay: -10s;
        }

        @keyframes constellationDrift {
            0% {
                transform: translate3d(0px, 0px, 0) scale(1);
            }

            50% {
                transform: translate3d(8px, -10px, 0) scale(1.01);
            }

            100% {
                transform: translate3d(-10px, 12px, 0) scale(0.99);
            }
        }

        .const-line {
            stroke: rgba(0, 212, 255, 0.18);
            stroke-width: 1.2;
            fill: none;
            stroke-linecap: round;
            filter: drop-shadow(0 0 4px rgba(0, 212, 255, 0.18));
            animation: linePulse 5s ease-in-out infinite;
        }

        .const-line.purple {
            stroke: rgba(139, 92, 246, 0.16);
            filter: drop-shadow(0 0 4px rgba(139, 92, 246, 0.18));
        }

        @keyframes linePulse {

            0%,
            100% {
                opacity: 0.18;
            }

            50% {
                opacity: 0.42;
            }
        }

        .const-star {
            fill: rgba(255, 255, 255, 0.95);
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.35));
            animation: starTwinkle 3.6s ease-in-out infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .const-star.cyan {
            fill: rgba(34, 211, 238, 0.95);
            filter: drop-shadow(0 0 7px rgba(34, 211, 238, 0.45));
        }

        .const-star.purple {
            fill: rgba(139, 92, 246, 0.92);
            filter: drop-shadow(0 0 7px rgba(139, 92, 246, 0.40));
        }

        .const-star.amber {
            fill: rgba(245, 158, 11, 0.92);
            filter: drop-shadow(0 0 7px rgba(245, 158, 11, 0.35));
        }

        .const-star.rose {
            fill: rgba(244, 63, 94, 0.92);
            filter: drop-shadow(0 0 7px rgba(244, 63, 94, 0.35));
        }

        .const-star.small {
            animation-duration: 4.5s;
        }

        .const-star.fast {
            animation-duration: 2.6s;
        }

        @keyframes starTwinkle {

            0%,
            100% {
                opacity: 0.35;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--kanban-primary);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.65), 0 0 20px rgba(0, 212, 255, 0.30);
            opacity: 0.32;
            animation: particleFloat 9s ease-in-out infinite;
        }

        .particle:nth-child(2n) {
            background: var(--kanban-violet);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.65), 0 0 20px rgba(139, 92, 246, 0.26);
        }

        .particle:nth-child(3n) {
            background: var(--kanban-cyan);
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.65), 0 0 20px rgba(34, 211, 238, 0.26);
        }

        .particle:nth-child(4n) {
            background: var(--kanban-amber);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.55), 0 0 20px rgba(245, 158, 11, 0.20);
        }

        .particle:nth-child(5n) {
            background: var(--kanban-rose);
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.55), 0 0 20px rgba(244, 63, 94, 0.20);
        }

        @keyframes particleFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.15;
            }

            50% {
                transform: translate(40px, -50px) scale(1.45);
                opacity: 0.55;
            }
        }

        .login-panel {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            padding: 22px 22px 20px;
            border-radius: var(--radius-xl);
            background: rgba(18, 25, 39, 0.28);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.45),
                0 0 40px rgba(0, 212, 255, 0.10),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .login-panel.shake {
            animation: loginCardShake 0.52s ease;
        }

        @keyframes loginCardShake {
            0% {
                transform: translateX(0);
            }

            15% {
                transform: translateX(-10px);
            }

            30% {
                transform: translateX(9px);
            }

            45% {
                transform: translateX(-7px);
            }

            60% {
                transform: translateX(6px);
            }

            75% {
                transform: translateX(-3px);
            }

            100% {
                transform: translateX(0);
            }
        }

        .login-panel::after {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background:
                linear-gradient(120deg,
                    rgba(0, 212, 255, 0.3),
                    rgba(139, 92, 246, 0.2),
                    rgba(0, 212, 255, 0.3));
            filter: blur(14px);
            opacity: 0.25;
            z-index: -1;
        }

        .login-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            padding: 1.5px;
            border-radius: var(--radius-xl);
            background: linear-gradient(135deg,
                    rgba(34, 211, 238, 0.95) 0%,
                    rgba(0, 212, 255, 0.95) 22%,
                    rgba(245, 158, 11, 0.92) 46%,
                    rgba(139, 92, 246, 0.92) 72%,
                    rgba(244, 63, 94, 0.92) 100%);
            background-size: 220% 220%;
            animation: kanbanBorderFlow 9s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            box-shadow:
                0 0 25px rgba(0, 212, 255, 0.14),
                0 0 38px rgba(139, 92, 246, 0.08);
            pointer-events: none;
        }

        .login-hologram {
            transition: transform 0.25s ease-out;
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background:
                linear-gradient(120deg,
                    rgba(0, 212, 255, 0.10),
                    rgba(139, 92, 246, 0.08),
                    rgba(244, 63, 94, 0.08),
                    rgba(0, 212, 255, 0.10));
            opacity: 0.6;
            animation: hologramShift 8s linear infinite;
        }

        .login-panel>* {
            position: relative;
            z-index: 3;
        }

        @keyframes kanbanBorderFlow {
            0% {
                background-position: 0% 50%;
            }

            25% {
                background-position: 50% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            75% {
                background-position: 50% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .bg-effects {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .bg-effects::before {
            content: "";
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.05) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes hologramShift {

            0% {
                transform: translateX(-30%) rotate(0deg);
            }

            50% {
                transform: translateX(30%) rotate(1deg);
            }

            100% {
                transform: translateX(-30%) rotate(0deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        .login-header {
            margin-bottom: 18px;
            position: relative;
            z-index: 2;
        }

        .login-header h2 {
            font-size: clamp(24px, 2.6vw, 32px);

                    #ffffff 0%,
                    var(--kanban-cyan) 18%,
                    var(--kanban-primary) 36%,
                    var(--kanban-amber) 58%,
                    var(--kanban-violet) 78%,

            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.8px;
            line-height: 1.1;
        }

        @keyframes loginTitleFlow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }

        .login-header p {

        .login-header p::before {

                0 0 10px rgba(0, 212, 255, 0.55),

        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            width: min(360px, calc(100vw - 32px));
            padding: 13px 15px;
            border-radius: 14px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.35),
                0 0 18px rgba(0, 212, 255, 0.10);
            opacity: 0;
            pointer-events: none;

            transition: opacity 0.26s ease, transform 0.26s ease;
            z-index: 9999;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0) translateX(0);
        }

        .toast i {

        .toast-content {

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const formSide = document.querySelector(".form-side");
            const imageSide = document.querySelector(".image-side");
            const loginPanel = document.querySelector(".login-panel");
            const glass = document.querySelector(".login-hologram");
            const constellations = document.querySelectorAll(".constellation-group");
            const ssoBtn = document.getElementById("ssoBtn");

            const toast = document.getElementById("toast");
            const toastIcon = document.getElementById("toastIcon");
            const toastTitle = document.getElementById("toastTitle");
            const toastMessage = document.getElementById("toastMessage");

            let toastTimer;

            function showToast({ type = "error", title, message }) {
                toast.classList.remove("toast-error", "toast-success");

                if (type === "success") {
                    toast.classList.add("toast-success");
                    toastIcon.className = "fas fa-circle-check";
                    toastTitle.textContent = title || "Autenticação concluída";
                    toastMessage.textContent = message || "Login realizado com sucesso.";
                } else {
                    toast.classList.add("toast-error");
                    toastIcon.className = "fas fa-circle-exclamation";
                    toastTitle.textContent = title || "Falha de autenticação";
                    toastMessage.textContent = message || "Não foi possível autenticar.";
                }

                toast.classList.add("show");
                clearTimeout(toastTimer);

                toastTimer = setTimeout(() => {
                    toast.classList.remove("show");
                }, type === "success" ? 2200 : 3600);
            }

            function hideToast() {
                toast.classList.remove("show");
                clearTimeout(toastTimer);
            }

            function shakeLoginCard() {
                loginPanel.classList.remove("shake");
                void loginPanel.offsetWidth;
                loginPanel.classList.add("shake");
            }

            loginPanel.addEventListener("animationend", (event) => {
                if (event.animationName === "loginCardShake") {
                    loginPanel.classList.remove("shake");
                }
            });

            formSide.style.opacity = "0";
            formSide.style.transform = "translateX(40px)";
            imageSide.style.opacity = "0";
            imageSide.style.transform = "translateX(-40px)";
            loginPanel.style.opacity = "0";
            loginPanel.style.transform = "translateY(18px) scale(0.985)";

            setTimeout(() => {
                formSide.style.transition = "all 0.8s ease";
                imageSide.style.transition = "all 0.8s ease";
                loginPanel.style.transition =
                    "opacity 0.85s cubic-bezier(0.16, 1, 0.3, 1), transform 0.85s cubic-bezier(0.16, 1, 0.3, 1)";

                formSide.style.opacity = "1";
                formSide.style.transform = "translateX(0)";
                imageSide.style.opacity = "1";
                imageSide.style.transform = "translateX(0)";
                loginPanel.style.opacity = "1";
                loginPanel.style.transform = "translateY(0) scale(1)";
            }, 80);

            document.addEventListener("mousemove", (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 2;
                const y = (e.clientY / window.innerHeight - 0.5) * 2;

                constellations.forEach((group, index) => {
                    const depth = (index + 1) * 6;
                    group.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
                });

                if (glass) {
                    const gx = e.clientX / window.innerWidth;
                    const gy = e.clientY / window.innerHeight;
                    const moveX = (gx - 0.5) * 60;
                    const moveY = (gy - 0.5) * 40;
                    glass.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });

            function createShootingStar() {
                const container = document.querySelector(".form-side");
                if (!container) return;

                const star = document.createElement("div");
                star.className = "shooting-star";

                const rect = container.getBoundingClientRect();
                const w = rect.width;
                const h = rect.height;
                const goesDown = Math.random() < 0.5;
                const goesRight = Math.random() < 0.5;

                let startX, startY, tx, ty, angleDeg;

                const distance = Math.max(w, h) * (1.05 + Math.random() * 0.35);
                const baseAngle = 28 + Math.random() * 16;
                const angleRad = baseAngle * (Math.PI / 180);

                tx = Math.cos(angleRad) * distance * (goesRight ? 1 : -1);
                ty = Math.sin(angleRad) * distance * (goesDown ? 1 : -1);
                angleDeg = Math.atan2(ty, tx) * (180 / Math.PI);

                if (goesRight) {
                    startX = Math.random() * (w * 0.4) - 80;
                } else {
                    startX = w - Math.random() * (w * 0.4) + 80;
                }

                if (goesDown) {
                    startY = -80;
                } else {
                    startY = h + 80;
                }

                const duration = 800 + Math.random() * 350;

                star.style.left = `${startX}px`;
                star.style.top = `${startY}px`;
                star.style.setProperty("--tx", `${tx}px`);
                star.style.setProperty("--ty", `${ty}px`);
                star.style.setProperty("--angle", `${angleDeg}deg`);
                star.style.animation = `meteorDiagonal ${duration}ms linear forwards`;

                container.appendChild(star);

                setTimeout(() => {
                    star.remove();
                }, duration + 80);
            }

            function shootingStarLoop() {
                createShootingStar();

                if (Math.random() > 0.5) {
                    setTimeout(() => {
                        createShootingStar();
                    }, 200 + Math.random() * 300);
                }

                const next = 3500 + Math.random() * 4500;
                setTimeout(shootingStarLoop, next);
            }

            shootingStarLoop();

            async function checkExistingSession() {
                try {
                    const response = await fetch("/api/auth/me", {
                        credentials: "include"
                    });

                    if (response.ok) {
                        window.location.href = "/";
                    }
                } catch (err) {
                    console.warn("Falha ao validar sessão:", err);
                }
            }

            checkExistingSession();

            const SSO_ERROR_MESSAGES = {
                access_denied: "Sua conta não tem permissão de acesso ao Orion.",
                inactive: "Seu usuário está inativo. Procure o administrador.",
                missing_state: "Sessão de login expirou. Tente novamente.",
                callback_failed: "Falha ao concluir o login SSO. Tente novamente.",
                orbital_not_configured: "SSO corporativo não está configurado no servidor.",
            };

            const ssoError = new URLSearchParams(window.location.search).get("error");
            if (ssoError) {
                shakeLoginCard();
                showToast({
                    type: "error",
                    title: "Falha no SSO",
                    message: SSO_ERROR_MESSAGES[ssoError] || "Não foi possível autenticar via SSO.",
                });
                const cleanUrl = window.location.pathname;
                window.history.replaceState({}, document.title, cleanUrl);
            }

            ssoBtn.addEventListener("click", async function () {
                hideToast();
                ssoBtn.disabled = true;

                try {
                    const response = await fetch("/auth/orbital/login", {
                        credentials: "include",
                    });
                    const data = await response.json().catch(() => ({}));

                    if (response.ok && data.url) {
                        window.location.href = data.url;
                        return;
                    }

                    shakeLoginCard();
                    showToast({
                        type: "error",
                        title: "SSO indisponível",
                        message: data.error || "Não foi possível iniciar o login SSO.",
                    });
                } catch (err) {
                    console.error(err);
                    shakeLoginCard();
                    showToast({
                        type: "error",
                        title: "Falha de conexão",
                        message: "Erro de conexão com o servidor.",
                    });
                } finally {
                    ssoBtn.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
